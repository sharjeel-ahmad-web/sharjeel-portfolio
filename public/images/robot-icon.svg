<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="100%" height="100%">
  <defs>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4ade80" /> <stop offset="100%" stop-color="#06b6d4" /> </linearGradient>
    
    <linearGradient id="darkGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>

    <style>
      .floating {
        animation: float 3s ease-in-out infinite;
        transform-origin: center;
      }
      .waving {
        animation: wave 2s ease-in-out infinite;
        transform-origin: 90px 170px;
      }
      .pulsing-shadow {
        animation: pulse 3s ease-in-out infinite;
        transform-origin: center;
      }
      .blinking {
        animation: blink 4s infinite;
        transform-origin: center;
      }

      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-15px); }
      }
      @keyframes wave {
        0%, 100% { transform: rotate(0deg); }
        50% { transform: rotate(-30deg); }
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 0.3; }
        50% { transform: scale(0.8); opacity: 0.1; }
      }
      @keyframes blink {
        0%, 96%, 100% { transform: scaleY(1); }
        98% { transform: scaleY(0.1); }
      }
    </style>
  </defs>

  <ellipse cx="150" cy="270" rx="40" ry="10" fill="#000000" class="pulsing-shadow" />

  <g class="floating">
    
    <g transform="translate(10, 40)">
      <rect x="0" y="0" width="90" height="50" rx="25" fill="#cffafe" stroke="#67e8f9" stroke-width="2"/>
      <polygon points="70,45 80,65 85,48" fill="#cffafe" stroke="#67e8f9" stroke-width="1"/>
      <text x="45" y="32" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#0891b2" text-anchor="middle">Hello!</text>
    </g>

    <line x1="150" y1="60" x2="150" y2="80" stroke="#4ade80" stroke-width="4" stroke-linecap="round"/>
    <circle cx="150" cy="55" r="6" fill="#4ade80"/>
    <rect x="135" y="80" width="30" height="10" rx="3" fill="#4ade80"/>

    <path d="M 90 170 Q 50 160 50 130" fill="none" stroke="url(#bodyGrad)" stroke-width="18" stroke-linecap="round" class="waving"/>

    <path d="M 210 170 Q 230 190 220 220" fill="none" stroke="url(#bodyGrad)" stroke-width="18" stroke-linecap="round"/>

    <rect x="95" y="90" width="110" height="80" rx="40" fill="url(#bodyGrad)"/>
    
    <rect x="105" y="115" width="90" height="35" rx="15" fill="url(#darkGrad)"/>
    
    <g class="blinking">
      <circle cx="130" cy="132" r="8" fill="#ffffff"/>
      <circle cx="132" cy="130" r="3" fill="#cffafe"/>
      <circle cx="170" cy="132" r="8" fill="#ffffff"/>
      <circle cx="172" cy="130" r="3" fill="#cffafe"/>
    </g>

    <path d="M 135 160 Q 150 170 165 160" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>

    <path d="M 110 170 L 190 170 Q 200 240 150 250 Q 100 240 110 170 Z" fill="url(#bodyGrad)"/>
    
    <path d="M 180 180 Q 190 220 160 240" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity="0.4"/>
  </g>
</svg>
